<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>IoT Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .navbar { background: #1e293b !important; border-bottom: 1px solid #334155; }
    .card { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    .form-select {
      background: #0f172a; border: 1px solid #475569; color: #e2e8f0;
    }
    .form-select:focus {
      background: #0f172a; color: #e2e8f0;
      border-color: #3b82f6; box-shadow: 0 0 0 0.2rem rgba(59,130,246,.25);
    }
    .table-dark-custom { --bs-table-bg: #0f172a; --bs-table-border-color: #334155; }
    .table-dark-custom thead th { background: #1e3a5f; color: #93c5fd; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.2rem 1.5rem; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .chart-container { position: relative; height: 260px; }
    #refreshBadge { font-size: 0.75rem; }
    .exceed-row { background: rgba(239,68,68,.12) !important; }
    .modal-content { background: #1e293b; border: 1px solid #475569; }
  </style>
</head>
<body>

<!-- ── 403 Forbidden 모달 ── -->
<div class="modal fade" id="forbiddenModal" data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-4 px-3">
        <div class="fs-1 mb-2">🚫</div>
        <h6 class="text-white mb-1">접근 권한 없음</h6>
        <p class="text-secondary small mb-3">해당 기능에 접근 권한이 없습니다.</p>
        <button type="button" class="btn btn-outline-secondary btn-sm px-4"
                onclick="location.href='/index.html'">확인</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Navbar ── -->
<nav class="navbar navbar-dark px-4 py-2">
  <a href="/index.html" class="navbar-brand fw-bold text-decoration-none">📊 IoT Dashboard</a>
  <div class="d-flex gap-2 align-items-center">
    <span id="refreshBadge" class="badge bg-secondary">갱신 대기</span>
    <button onclick="logout()" class="btn btn-sm btn-outline-danger">로그아웃</button>
  </div>
</nav>

<div class="container-fluid py-4 px-4">

  <!-- ── 장치 선택 ── -->
  <div class="row mb-4">
    <div class="col-md-4">
      <label class="form-label text-secondary small mb-1">장치 선택</label>
      <select id="deviceSelect" class="form-select" onchange="onDeviceChange()">
        <option value="">-- 장치를 선택하세요 --</option>
      </select>
    </div>
    <div class="col-md-8 d-flex align-items-end gap-3" id="statCards" style="display:none!important;">
      <div class="stat-card text-center">
        <div class="text-secondary small">최근 알림</div>
        <div id="statTotalAlert" class="stat-value text-danger">—</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-secondary small">최근 7일 알림</div>
        <div id="statWeekAlert" class="stat-value text-warning">—</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-secondary small">수집 데이터</div>
        <div id="statDataCount" class="stat-value text-info">—</div>
      </div>
    </div>
  </div>

  <!-- ── 차트 영역 ── -->
  <div class="row g-4 mb-4">

    <!-- 센서 라인 차트 -->
    <div class="col-lg-8">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0 text-info">📈 최근 50개 센서값</h6>
          <span id="thresholdLabel" class="badge bg-danger d-none">임계값: —</span>
        </div>
        <div class="chart-container">
          <canvas id="sensorChart"></canvas>
        </div>
      </div>
    </div>

    <!-- 일별 알림 바 차트 -->
    <div class="col-lg-4">
      <div class="card p-3">
        <h6 class="mb-2 text-info">🚨 최근 7일 알림 발생</h6>
        <div class="chart-container">
          <canvas id="alertChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <!-- ── 알림 테이블 ── -->
  <div class="card p-3">
    <h6 class="mb-3 text-info">🔔 최근 알림 목록 (최대 20건)</h6>
    <div class="table-responsive">
      <table class="table table-dark table-dark-custom table-hover mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>장치 ID</th>
            <th>센서값</th>
            <th>임계값</th>
            <th>메시지</th>
            <th>발생 시각</th>
          </tr>
        </thead>
        <tbody id="alertTableBody">
          <tr><td colspan="6" class="text-center text-secondary py-4">장치를 선택하면 알림이 표시됩니다</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* ── 공통 fetch 함수 ── */
  async function apiFetch(url, options = {}) {
    const token = localStorage.getItem('jwt_token');
    if (!token) { location.href = '/index.html'; return null; }

    let res;
    try {
      res = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
          ...(options.headers || {})
        }
      });
    } catch (e) {
      console.error('[apiFetch] 네트워크 오류:', url, e);
      return null;
    }

    if (res.ok) return res;

    if (res.status === 401) {
      localStorage.removeItem('jwt_token');
      location.href = '/index.html';
      return null;
    }

    if (res.status === 403) {
      new bootstrap.Modal(document.getElementById('forbiddenModal')).show();
      return null;
    }

    try {
      const err = await res.json();
      console.error(`[apiFetch] ${res.status} ${err.error}: ${err.message}`, url);
    } catch {
      console.error(`[apiFetch] ${res.status} (응답 파싱 실패):`, url);
    }
    return null;
  }

  /* ── 로그아웃 ── */
  function logout() {
    localStorage.removeItem('jwt_token');
    location.href = '/index.html';
  }

  /* ── JWT payload 디코딩 ── */
  function decodeJwt(token) {
    try {
      const payload = token.split('.')[1];
      return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
    } catch { return null; }
  }

  /* ── 초기 JWT + role 확인 ── */
  const DASHBOARD_ALLOWED_ROLES = ['SUPER_ADMIN', 'DEVICE_MANAGER', 'DATA_INPUTTER', 'DATA_ANALYST', 'VIEWER'];
  (function checkAccess() {
    const token = localStorage.getItem('jwt_token');
    if (!token) { location.href = '/index.html'; return; }
    const payload = decodeJwt(token);
    if (!payload || !DASHBOARD_ALLOWED_ROLES.includes(payload.role)) {
      new bootstrap.Modal(document.getElementById('forbiddenModal')).show();
    }
  })();

  /* ── Chart.js 인스턴스 ── */
  let sensorChart = null;
  let alertChart  = null;
  let currentThreshold = null;

  function initCharts() {
    const sensorCtx = document.getElementById('sensorChart').getContext('2d');
    sensorChart = new Chart(sensorCtx, {
      type: 'line',
      data: { labels: [], datasets: [{
        label: '센서값',
        data: [],
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,.1)',
        borderWidth: 2,
        pointRadius: 3,
        tension: 0.3,
        fill: true
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#94a3b8' } } },
        scales: {
          x: { ticks: { color: '#64748b', maxTicksLimit: 8 }, grid: { color: '#1e3a5f' } },
          y: { ticks: { color: '#64748b' }, grid: { color: '#1e3a5f' } }
        },
        animation: { duration: 300 }
      }
    });

    const alertCtx = document.getElementById('alertChart').getContext('2d');
    alertChart = new Chart(alertCtx, {
      type: 'bar',
      data: { labels: [], datasets: [{
        label: '알림 건수',
        data: [],
        backgroundColor: 'rgba(239,68,68,.7)',
        borderColor: '#ef4444',
        borderWidth: 1,
        borderRadius: 4
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#94a3b8' } } },
        scales: {
          x: { ticks: { color: '#64748b' }, grid: { color: '#1e3a5f' } },
          y: {
            ticks: { color: '#64748b', stepSize: 1 },
            grid: { color: '#1e3a5f' },
            beginAtZero: true
          }
        },
        animation: { duration: 300 }
      }
    });
  }

  /* ── 장치 목록 로드 ── */
  async function loadDevices() {
    const res = await apiFetch('/devices');
    if (!res) return;
    const devices = await res.json();
    const sel = document.getElementById('deviceSelect');
    sel.innerHTML = '<option value="">-- 장치를 선택하세요 --</option>';
    devices.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.dataset.threshold = d.thresholdValue || 0;
      opt.textContent = `${d.name} (${d.deviceType}) — ${d.location}`;
      sel.appendChild(opt);
    });
  }

  /* ── 대시보드 초기 상태로 리셋 ── */
  function resetDashboard() {
    currentThreshold = null;
    document.getElementById('thresholdLabel').classList.add('d-none');
    document.getElementById('statCards').style.setProperty('display', 'none', 'important');
    document.getElementById('statTotalAlert').textContent = '—';
    document.getElementById('statWeekAlert').textContent = '—';
    document.getElementById('statDataCount').textContent = '—';
    document.getElementById('alertTableBody').innerHTML =
      '<tr><td colspan="6" class="text-center text-secondary py-4">장치를 선택하면 알림이 표시됩니다</td></tr>';
    sensorChart.data.labels = [];
    sensorChart.data.datasets[0].data = [];
    if (sensorChart.data.datasets.length > 1) sensorChart.data.datasets.splice(1);
    sensorChart.update();
    alertChart.data.labels = [];
    alertChart.data.datasets[0].data = [];
    alertChart.update();
  }

  /* ── 장치 선택 이벤트 ── */
  function onDeviceChange() {
    const sel = document.getElementById('deviceSelect');
    const deviceId = sel.value;
    if (!deviceId) { resetDashboard(); return; }

    const opt = sel.options[sel.selectedIndex];
    currentThreshold = parseFloat(opt.dataset.threshold) || null;

    const badge = document.getElementById('thresholdLabel');
    if (currentThreshold) {
      badge.textContent = `임계값: ${currentThreshold}`;
      badge.classList.remove('d-none');
    } else {
      badge.classList.add('d-none');
    }

    document.getElementById('statCards').style.removeProperty('display');
    loadAll(deviceId);
  }

  /* ── 전체 데이터 로드 ── */
  async function loadAll(deviceId) {
    updateRefreshBadge();
    await Promise.all([
      loadSensorData(deviceId),
      loadAlertDailyCount(deviceId),
      loadRecentAlerts(deviceId)
    ]);
  }

  /* ── 센서 데이터 라인 차트 ── */
  async function loadSensorData(deviceId) {
    const res = await apiFetch(`/sensor-data/${deviceId}`);
    if (!res) return;
    const data = await res.json();

    const recent = data.slice(0, 50).reverse();
    document.getElementById('statDataCount').textContent = data.length.toLocaleString();

    const labels = recent.map(d => formatTime(d.recordedAt));
    const values = recent.map(d => d.value);

    const pointColors = values.map(v =>
      currentThreshold && v > currentThreshold ? '#ef4444' : '#3b82f6'
    );

    sensorChart.data.labels = labels;
    sensorChart.data.datasets[0].data = values;
    sensorChart.data.datasets[0].pointBackgroundColor = pointColors;
    sensorChart.update();

    if (currentThreshold) {
      if (sensorChart.data.datasets.length < 2) {
        sensorChart.data.datasets.push({
          label: '임계값',
          data: values.map(() => currentThreshold),
          borderColor: 'rgba(239,68,68,.6)',
          borderWidth: 1.5,
          borderDash: [6, 3],
          pointRadius: 0,
          fill: false
        });
      } else {
        sensorChart.data.datasets[1].data = values.map(() => currentThreshold);
      }
      sensorChart.update();
    }
  }

  /* ── 일별 알림 바 차트 ── */
  async function loadAlertDailyCount(deviceId) {
    const res = await apiFetch(`/alerts/daily-count?deviceId=${deviceId}&days=7`);
    if (!res) return;
    const data = await res.json();

    const weekTotal = data.reduce((s, d) => s + d.count, 0);
    document.getElementById('statWeekAlert').textContent = weekTotal;

    alertChart.data.labels = data.map(d => d.date.substring(5));
    alertChart.data.datasets[0].data = data.map(d => d.count);
    alertChart.update();
  }

  /* ── 최근 알림 테이블 ── */
  async function loadRecentAlerts(deviceId) {
    const res = await apiFetch(`/alerts/recent?deviceId=${deviceId}&limit=20`);
    if (!res) return;
    const alerts = await res.json();

    document.getElementById('statTotalAlert').textContent = alerts.length >= 20 ? '20+' : alerts.length;

    const tbody = document.getElementById('alertTableBody');
    if (alerts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">알림 없음</td></tr>';
      return;
    }
    tbody.innerHTML = alerts.map((a, i) => `
      <tr class="${a.sensorValue > a.thresholdValue ? 'exceed-row' : ''}">
        <td class="text-secondary">${i + 1}</td>
        <td>${a.deviceId}</td>
        <td class="${a.sensorValue > a.thresholdValue ? 'text-danger fw-bold' : ''}">${a.sensorValue?.toFixed(1)}</td>
        <td>${a.thresholdValue?.toFixed(1)}</td>
        <td class="text-truncate" style="max-width:240px;" title="${a.message}">${a.message}</td>
        <td class="text-secondary small">${formatDatetime(a.createdAt)}</td>
      </tr>`
    ).join('');
  }

  /* ── 자동 갱신 30초 ── */
  setInterval(() => {
    const deviceId = document.getElementById('deviceSelect').value;
    if (deviceId) loadAll(deviceId);
  }, 30000);

  /* ── 갱신 시각 뱃지 ── */
  function updateRefreshBadge() {
    const el = document.getElementById('refreshBadge');
    el.textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR', { hour12: false });
    el.className = 'badge bg-info text-dark';
  }

  /* ── 날짜 포맷 ── */
  function formatTime(dt) {
    if (!dt) return '';
    const d = new Date(dt);
    return d.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  function formatDatetime(dt) {
    if (!dt) return '';
    const d = new Date(dt);
    return d.toLocaleString('ko-KR', { hour12: false,
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit' });
  }

  /* ── 초기화 ── */
  initCharts();
  loadDevices();
</script>
</body>
</html>
