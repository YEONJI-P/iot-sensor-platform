<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>IoT Simulator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .navbar { background: #1e293b !important; border-bottom: 1px solid #334155; }
    .card { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    .form-control, .form-select {
      background: #0f172a; border: 1px solid #475569; color: #e2e8f0;
    }
    .form-control:focus, .form-select:focus {
      background: #0f172a; color: #e2e8f0;
      border-color: #3b82f6; box-shadow: 0 0 0 0.2rem rgba(59,130,246,.25);
    }
    .form-control::placeholder { color: #64748b; }
    #logArea {
      background: #020617; border: 1px solid #1e3a5f;
      border-radius: 8px; height: 320px;
      overflow-y: auto; font-family: monospace; font-size: 0.85rem;
      padding: 12px;
    }
    .log-normal { color: #4ade80; }
    .log-exceed { color: #f87171; }
    .log-info   { color: #60a5fa; }
    .log-warn   { color: #facc15; }
    .badge-pending { background: #854d0e; color: #fef08a; }
    .badge-running { background: #14532d; color: #86efac; }
    .modal-content { background: #1e293b; border: 1px solid #475569; }
  </style>
</head>
<body>

<!-- ── 403 Forbidden 모달 ── -->
<div class="modal fade" id="forbiddenModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-4 px-3">
        <div class="fs-1 mb-2">🚫</div>
        <h6 class="text-white mb-1">접근 권한 없음</h6>
        <p class="text-secondary small mb-3">해당 기능에 접근 권한이 없습니다.</p>
        <button type="button" class="btn btn-outline-secondary btn-sm px-4" data-bs-dismiss="modal">확인</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Navbar ── -->
<nav class="navbar navbar-dark px-4 py-2">
  <a href="/index.html" class="navbar-brand fw-bold text-decoration-none">🏭 IoT Simulator</a>
  <div id="navRight" class="d-none d-flex gap-2 align-items-center">
    <a href="/dashboard.html" class="btn btn-sm btn-outline-info">📊 대시보드</a>
    <button onclick="logout()" class="btn btn-sm btn-outline-danger">로그아웃</button>
  </div>
</nav>

<!-- ── 로그인 섹션 ── -->
<div id="loginSection" class="d-flex justify-content-center align-items-center" style="min-height:85vh;">
  <div class="card p-4" style="width:360px;">
    <h5 class="mb-4 text-center">로그인</h5>
    <div class="mb-3">
      <label class="form-label text-secondary small">사원번호</label>
      <input id="loginEmployeeId" type="text" class="form-control" placeholder="예: DM001"/>
    </div>
    <div class="mb-3">
      <label class="form-label text-secondary small">비밀번호</label>
      <input id="loginPassword" type="password" class="form-control" placeholder="비밀번호 입력"/>
    </div>
    <div id="loginError" class="text-danger small mb-2 d-none"></div>
    <button onclick="login()" class="btn btn-primary w-100">로그인</button>
    <div class="text-center mt-3">
      <a href="/index.html" class="text-secondary small">← 홈으로</a>
    </div>
  </div>
</div>

<!-- ── 시뮬레이터 섹션 ── -->
<div id="simulatorSection" class="container py-4 d-none">
  <div class="row g-4">

    <!-- 설정 패널 -->
    <div class="col-lg-4">
      <div class="card p-4 h-100">
        <h6 class="mb-3 text-info">⚙️ 시뮬레이터 설정</h6>
        <div class="mb-3">
          <label class="form-label text-secondary small">장치 선택</label>
          <select id="deviceSelect" class="form-select" onchange="onDeviceChange()">
            <option value="">-- 장치 선택 --</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label text-secondary small">전송 간격 (초, 최소 1)</label>
          <input id="intervalSeconds" type="number" class="form-control" value="2" min="1"/>
        </div>
        <div class="mb-3">
          <label class="form-label text-secondary small">전송 횟수 (1~100)</label>
          <input id="count" type="number" class="form-control" value="10" min="1" max="100"/>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button id="startBtn" onclick="startSimulation()" class="btn btn-success flex-fill" disabled>
            ▶ START
          </button>
          <button id="stopBtn" onclick="stopSimulation()" class="btn btn-danger flex-fill" disabled>
            ■ STOP
          </button>
        </div>
        <div class="mt-3 text-center">
          <span id="statusBadge" class="badge badge-pending px-3 py-2">대기 중</span>
        </div>
      </div>
    </div>

    <!-- 로그 패널 -->
    <div class="col-lg-8">
      <div class="card p-4 h-100 d-flex flex-column">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="mb-0 text-info">📋 실행 로그</h6>
          <button onclick="clearLog()" class="btn btn-sm btn-outline-secondary">지우기</button>
        </div>
        <div id="logArea" class="flex-fill"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* ── 공통 fetch 함수 ── */
  async function apiFetch(url, options = {}) {
    const token = localStorage.getItem('jwt_token');
    const res = await fetch(url, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
        ...(options.headers || {})
      }
    });

    if (res.status === 401) {
      alert('세션이 만료됐습니다. 다시 로그인해주세요.');
      localStorage.removeItem('jwt_token');
      showLogin();
      return null;
    }

    if (res.status === 403) {
      new bootstrap.Modal(document.getElementById('forbiddenModal')).show();
      return null;
    }

    return res;
  }

  /* ── 상태 변수 ── */
  let pollingTimer = null;
  let currentDeviceId = null;

  /* ── 초기화 ── */
  window.onload = () => {
    if (localStorage.getItem('jwt_token')) showSimulator();
    else showLogin();
  };

  /* ── 화면 전환 ── */
  function showLogin() {
    stopPolling();
    document.getElementById('loginSection').classList.remove('d-none');
    document.getElementById('simulatorSection').classList.add('d-none');
    document.getElementById('navRight').classList.add('d-none');
  }

  async function showSimulator() {
    document.getElementById('loginSection').classList.add('d-none');
    document.getElementById('simulatorSection').classList.remove('d-none');
    document.getElementById('navRight').classList.remove('d-none');
    await loadDevices();
  }

  /* ── 로그인 (공개 API — apiFetch 불필요) ── */
  async function login() {
    const employeeId = document.getElementById('loginEmployeeId').value.trim();
    const password   = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.classList.add('d-none');

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employeeId, password })
      });
      if (!res.ok) {
        errEl.textContent = await res.text();
        errEl.classList.remove('d-none');
        return;
      }
      localStorage.setItem('jwt_token', await res.text());
      showSimulator();
    } catch {
      errEl.textContent = '서버 연결 오류';
      errEl.classList.remove('d-none');
    }
  }

  /* ── 로그아웃 ── */
  function logout() {
    stopPolling();
    localStorage.removeItem('jwt_token');
    location.href = '/index.html';
  }

  /* ── 장치 목록 로드 ── */
  async function loadDevices() {
    const res = await apiFetch('/simulator/devices');
    if (!res) return;
    const devices = await res.json();
    const sel = document.getElementById('deviceSelect');
    sel.innerHTML = '<option value="">-- 장치 선택 --</option>';
    devices.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = `${d.name} (${d.deviceType}) — ${d.location}`;
      sel.appendChild(opt);
    });
    appendLog('info', `장치 ${devices.length}개 로드됨`);
  }

  /* ── 장치 선택 시 상태 확인 ── */
  async function onDeviceChange() {
    const deviceId = getSelectedDeviceId();
    if (!deviceId) { setButtons(false, false); return; }
    currentDeviceId = deviceId;
    stopPolling();
    await syncStatus(deviceId);
  }

  async function syncStatus(deviceId) {
    const res = await apiFetch(`/simulator/status/${deviceId}`);
    if (!res) return;
    const status = await res.json();
    if (status.running) {
      appendLog('info', `실행 중인 작업 복원: ${status.completedCount}/${status.totalCount}`);
      setButtons(false, true);
      updateBadge(true);
      startPolling(deviceId);
    } else {
      setButtons(true, false);
      updateBadge(false);
    }
  }

  /* ── 시뮬레이터 시작 ── */
  async function startSimulation() {
    const deviceId        = getSelectedDeviceId();
    const intervalSeconds = parseInt(document.getElementById('intervalSeconds').value) || 2;
    const count           = parseInt(document.getElementById('count').value) || 10;
    if (!deviceId) { appendLog('warn', '장치를 선택해주세요'); return; }

    const res = await apiFetch('/simulator/start', {
      method: 'POST',
      body: JSON.stringify({ deviceId: parseInt(deviceId), intervalSeconds, count })
    });
    if (!res) return;

    if (res.status === 409) { appendLog('warn', await res.text()); return; }
    if (!res.ok) { appendLog('warn', await res.text()); return; }

    appendLog('info', `시뮬레이션 시작 — 장치 ${deviceId}, ${count}회, ${intervalSeconds}초 간격`);
    setButtons(false, true);
    updateBadge(true);
    currentDeviceId = deviceId;
    startPolling(deviceId);
  }

  /* ── 시뮬레이터 중단 ── */
  async function stopSimulation() {
    const deviceId = currentDeviceId || getSelectedDeviceId();
    if (!deviceId) return;
    const res = await apiFetch('/simulator/stop', {
      method: 'POST',
      body: JSON.stringify({ deviceId: parseInt(deviceId) })
    });
    if (res) appendLog('warn', '시뮬레이터 중단 요청됨');
  }

  /* ── 폴링 ── */
  function startPolling(deviceId) {
    stopPolling();
    pollingTimer = setInterval(async () => {
      const res = await apiFetch(`/simulator/status/${deviceId}`);
      if (!res) { stopPolling(); return; }
      const status = await res.json();
      updateProgressLog(status);
      if (!status.running) {
        stopPolling();
        setButtons(true, false);
        updateBadge(false);
        const isDone = status.completedCount >= status.totalCount && status.totalCount > 0;
        appendLog('info', isDone ? `✅ 완료 (${status.completedCount}/${status.totalCount})` : '⛔ 중단됨');
      }
    }, 1000);
  }

  function stopPolling() {
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
  }

  /* ── UI 헬퍼 ── */
  function getSelectedDeviceId() { return document.getElementById('deviceSelect').value; }

  function setButtons(startEnabled, stopEnabled) {
    document.getElementById('startBtn').disabled = !startEnabled;
    document.getElementById('stopBtn').disabled  = !stopEnabled;
  }

  function updateBadge(running) {
    const el = document.getElementById('statusBadge');
    el.className = 'badge px-3 py-2 ' + (running ? 'badge-running' : 'badge-pending');
    el.textContent = running ? '실행 중' : '대기 중';
  }

  let lastProgressLine = null;
  function updateProgressLog(status) {
    const logArea = document.getElementById('logArea');
    const text = `진행 중: ${status.completedCount} / ${status.totalCount}`;
    if (lastProgressLine && logArea.contains(lastProgressLine)) {
      lastProgressLine.textContent = `[${now()}] ${text}`;
    } else {
      lastProgressLine = appendLog('normal', text, true);
    }
  }

  function appendLog(type, text, returnEl = false) {
    const logArea = document.getElementById('logArea');
    const line = document.createElement('div');
    line.className = `log-${type}`;
    line.textContent = `[${now()}] ${text}`;
    logArea.appendChild(line);
    logArea.scrollTop = logArea.scrollHeight;
    return returnEl ? line : undefined;
  }

  function clearLog() {
    document.getElementById('logArea').innerHTML = '';
    lastProgressLine = null;
  }

  function now() {
    return new Date().toLocaleTimeString('ko-KR', { hour12: false });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('loginSection').classList.contains('d-none')) login();
  });
</script>
</body>
</html>
