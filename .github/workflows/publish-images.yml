# backend·explain·simulator 컨테이너 이미지를 GHCR에 발행한다.
#
# main CI가 성공하면 reusable workflow로 호출해 세 이미지를 자동 발행한다. workflow_dispatch는
# 선택 서비스 재발행용으로 유지한다. 발행만으로 홈서버 배포 버전은 바뀌지 않으며,
# 소비자(personal-hub)가 아래 불변 SHA를 명시적으로 pin해야 실제 배포된다.
#
# 태그 규칙: 커밋 SHA 하나만 붙인다. `latest` 는 만들지 않는다 —
# 같은 태그가 다른 코드를 가리키면 롤백할 좌표가 사라진다. 배포 측은 SHA 를 명시해 pin 한다.
name: Publish images

on:
  workflow_call:
    inputs:
      services:
        description: 발행할 서비스
        required: false
        type: string
        default: all
  workflow_dispatch:
    inputs:
      services:
        description: 발행할 서비스
        type: choice
        options: [all, backend, explain, simulator]
        default: all

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: services/backend
            image: sensor-monitor-backend
          - service: explain
            context: services/explain
            image: sensor-monitor-explain
          - service: simulator
            context: services/simulator
            image: sensor-monitor-simulator
    steps:
      - name: Skip unselected service
        id: gate
        run: |
          if [ "${{ inputs.services }}" = "all" ] || [ "${{ inputs.services }}" = "${{ matrix.service }}" ]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.gate.outputs.selected == 'true'
        uses: actions/checkout@v4

      # GHCR 경로는 소문자만 허용하는데 소유자(YEONJI-P)에 대문자가 있다.
      # 하드코딩 대신 컨텍스트에서 끌어와 소문자로 접어, fork·소유자 변경에도 따라간다.
      - name: Resolve image reference
        if: steps.gate.outputs.selected == 'true'
        id: ref
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.gate.outputs.selected == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: steps.gate.outputs.selected == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.gate.outputs.selected == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.ref.outputs.image }}:${{ github.sha }}
          # source 라벨은 이미지 출처와 저장소 연결을 명시한다. 패키지 visibility는 별도 설정이며,
          # 최초 발행 패키지는 private이다. 공개 전환 여부는 발행 후 운영자가 결정한다.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published reference
        if: steps.gate.outputs.selected == 'true'
        run: echo "\`${{ steps.ref.outputs.image }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
