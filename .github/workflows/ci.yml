name: Iot Sensor Platform CI
on:
  push:
    branches: [ "main" ]
    # 이미지 build context나 발행 workflow가 바뀐 push만 전체 검증·발행한다.
    paths:
      - "services/backend/**"
      - "services/explain/**"
      - "services/simulator/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish-images.yml"

# main push가 연달아 오면 최신 commit이 앞선 commit을 모두 포함하므로 오래된 run은 취소한다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: services/backend
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: services/backend
      - name: Prepare tested backend artifact
        run: |
          mapfile -t jars < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' -print)
          if [ "${#jars[@]}" -ne 1 ]; then
            echo "Expected exactly one executable backend jar, found ${#jars[@]}" >&2
            exit 1
          fi
          mkdir -p build/ci-image
          cp "${jars[0]}" build/ci-image/app.jar
        working-directory: services/backend
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install explain dependencies
        run: |
          python -m pip install uv
          uv sync --frozen
        working-directory: services/explain
      - name: Test explain
        run: uv run pytest
        working-directory: services/explain
      - name: Install simulator dependencies
        run: pip install -r requirements.txt
        working-directory: services/simulator
      - name: Test simulator
        run: python -m unittest -v test_simulator.py
        working-directory: services/simulator
      - name: Upload tested backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-boot-jar
          path: services/backend/build/ci-image/app.jar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish-images:
    name: Publish immutable images
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-images.yml
    with:
      services: all
      use_backend_artifact: true

  propose-personal-hub-release:
    name: Propose personal-hub release
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Sensor Monitor automation
        uses: actions/checkout@v4

      - name: Checkout personal-hub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/personal-hub
          ref: main
          path: personal-hub
          token: ${{ secrets.PERSONAL_HUB_PR_TOKEN }}

      - name: Update Sensor pin and open PR
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_HUB_PR_TOKEN }}
          HUB_REPOSITORY: ${{ github.repository_owner }}/personal-hub
          SOURCE_SHA: ${{ github.sha }}
        run: bash .github/scripts/propose-personal-hub-release.sh personal-hub
