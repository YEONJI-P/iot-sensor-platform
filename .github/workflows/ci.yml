name: Iot Sensor Platform CI
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: services/backend
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: services/backend
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install explain dependencies
        run: |
          python -m pip install uv
          uv sync --frozen
        working-directory: services/explain
      - name: Test explain
        run: uv run pytest
        working-directory: services/explain
      - name: Install simulator dependencies
        run: pip install -r requirements.txt
        working-directory: services/simulator
      - name: Test simulator
        run: python -m unittest -v test_simulator.py
        working-directory: services/simulator

  publish-images:
    name: Publish immutable images
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-images.yml
    with:
      services: all

  propose-personal-hub-release:
    name: Propose personal-hub release
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Sensor Monitor automation
        uses: actions/checkout@v4

      - name: Checkout personal-hub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/personal-hub
          ref: main
          path: personal-hub
          token: ${{ secrets.PERSONAL_HUB_PR_TOKEN }}

      - name: Update Sensor pin and open PR
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_HUB_PR_TOKEN }}
          HUB_REPOSITORY: ${{ github.repository_owner }}/personal-hub
          SOURCE_SHA: ${{ github.sha }}
        run: bash .github/scripts/propose-personal-hub-release.sh personal-hub
