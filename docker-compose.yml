name: sensor-monitor

services:
  # 독립 풀 데모 전용 DB. 홈서버 구성은 docker-compose.home.yml 에서 기존 PostgreSQL의
  # 별도 sensor_monitor database를 사용하므로 이 컨테이너를 만들지 않는다.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sensor_monitor
      POSTGRES_USER: sensor_monitor
      POSTGRES_PASSWORD: sensor_monitor
    ports:
      - "5433:5432"   # 호스트 공용 Postgres(5432)와 충돌 피하려 5433 로 노출
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensor_monitor -d sensor_monitor"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./services/backend
    # 이 compose 는 로컬 개발·데모 전용이다. 태그를 명시하지 않으면 compose 가 암묵적으로
    # `sensor-monitor-backend:latest` 를 만들어, 배포용 GHCR 이미지와 이름이 겹쳐 보인다.
    # `:local` 로 못박아 로컬 빌드 산출물과 배포 이미지를 눈으로 구분한다.
    # 배포용 이미지는 ghcr.io/yeonji-p/sensor-monitor-backend:<git-sha> (README §배포 이미지 계약).
    image: sensor-monitor-backend:local
    depends_on:
      postgres:
        condition: service_healthy
      explain:
        condition: service_started
    # 필수 서비스 설정은 소비 서비스가 소유한다. 기동 전 README에 따라 example을 복사한다.
    env_file: ./services/backend/.env
    environment:
      # 오케스트레이션 토폴로지 값만 둔다(내부 호스트명·데모 DB 크레덴셜). env_file 보다 우선 적용됨.
      # SERVER_PORT 는 이미지 기본값(8080)과 같은 값을 명시해 둔다 — 데모 호스트 매핑과 한눈에 맞춰 보라고.
      # 이미지 기본값은 prod지만 이 compose는 로컬 데모이므로 기존 ddl-auto/update·SQL 로그 동작을 보존한다.
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/sensor_monitor
      DB_USERNAME: sensor_monitor
      DB_PASSWORD: sensor_monitor
      EXPLAIN_ENABLED: "true"
      EXPLAIN_BASE_URL: http://explain:8000
    ports:
      - "8080:8080"

  explain:
    build: ./services/explain
    # backend 와 같은 이유로 로컬 태그를 명시한다(암묵적 :latest 금지).
    # 배포용 이미지는 ghcr.io/yeonji-p/sensor-monitor-explain:<git-sha> (README §배포 이미지 계약).
    image: sensor-monitor-explain:local
    # echo가 기본이므로 env 파일은 선택 사항이다. Gemini를 사용할 때만 example을 복사한다.
    env_file:
      - path: ./services/explain/.env
        required: false
    environment:
      # PORT 는 이미지 기본값(8000)과 같은 값을 명시해 둔다. env_file 보다 우선 적용됨.
      PORT: 8000
    ports:
      - "8000:8000"

  # 실측 CSV 리플레이 배치. DB seed와 구분하기 위해 replay 프로파일로만 실행한다.
  # 선행: seed.sql 로 계정/장치/임계값을 먼저 적재하고 공개 데이터 파일을 내려받는다.
  simulator-replay:
    build: ./services/simulator
    image: sensor-monitor-simulator:local
    profiles: [replay]
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./services/simulator/data:/app/data
    command: ["--mode", "replay", "--all", "--base-url", "http://backend:8080"]

  # 합성 데이터 상시 스트림. 명시적으로 live 프로파일을 켰을 때만 평일 운영시간에 전송한다.
  simulator-live:
    build: ./services/simulator
    image: sensor-monitor-simulator:local
    profiles: [live]
    depends_on:
      backend:
        condition: service_started
    command:
      - --mode
      - synthetic
      - --all
      - --interval
      - "10"
      - --active-days
      - mon-fri
      - --active-hours
      - 08:00-18:00
      - --timezone
      - Asia/Seoul
      - --base-url
      - http://backend:8080
    restart: unless-stopped
    stop_grace_period: 10s

volumes:
  postgres_data:
