services:
  postgresql:
    image: postgres:15
    container_name: iot-postgresql
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iot-redis
    ports:
      - "6379:6379"

  ax:
    build: ./ax
    container_name: iot-ax
    ports:
      - "8000:8000"
    environment:
      AX_PROVIDER: ${AX_PROVIDER:-echo}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gemini-2.0-flash}

volumes:
  postgres_data: