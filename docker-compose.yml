version: '3.8'

services:
  postgresql:
    image: postgres:15
    container_name: iot-postgresql
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iot-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: