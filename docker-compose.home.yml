name: sensor-monitor

# 홈서버 추가 설치용 독립 Compose 골격이다. PostgreSQL 컨테이너와 DB volume을 만들지 않는다.
# backend의 DB_URL은 홈서버 기존 PostgreSQL 인스턴스에 미리 만든 별도 sensor_monitor
# database를 가리켜야 한다. 두 외부 network와 이미지 SHA는 루트 .env에서 Compose가 읽는다.
# 공개 배포 전 README의 ingest 경로 제한·관리자 bootstrap·DB host guard를 먼저 완료한다.
services:
  backend:
    image: ghcr.io/yeonji-p/sensor-monitor-backend:${SENSOR_MONITOR_IMAGE_TAG:?SENSOR_MONITOR_IMAGE_TAG is required}
    env_file: ./services/backend/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      EXPLAIN_ENABLED: "true"
      EXPLAIN_BASE_URL: http://explain:8000
    depends_on:
      explain:
        condition: service_started
    networks:
      - app
      - database
      - proxy
    restart: unless-stopped

  explain:
    image: ghcr.io/yeonji-p/sensor-monitor-explain:${SENSOR_MONITOR_IMAGE_TAG:?SENSOR_MONITOR_IMAGE_TAG is required}
    env_file:
      - path: ./services/explain/.env
        required: false
    environment:
      PORT: 8000
    networks:
      - app
    restart: unless-stopped

  simulator-live:
    image: ghcr.io/yeonji-p/sensor-monitor-simulator:${SENSOR_MONITOR_IMAGE_TAG:?SENSOR_MONITOR_IMAGE_TAG is required}
    profiles: [live]
    depends_on:
      backend:
        condition: service_started
    command:
      - --mode
      - synthetic
      - --all
      - --interval
      - "10"
      - --active-days
      - mon-fri
      - --active-hours
      - 08:00-18:00
      - --timezone
      - Asia/Seoul
      - --base-url
      - http://backend:8080
    networks:
      - app
    restart: unless-stopped
    stop_grace_period: 10s

networks:
  app:
  database:
    external: true
    name: ${SENSOR_MONITOR_DB_NETWORK:?SENSOR_MONITOR_DB_NETWORK is required}
  proxy:
    external: true
    name: ${SENSOR_MONITOR_PROXY_NETWORK:?SENSOR_MONITOR_PROXY_NETWORK is required}
