# 테스트 전용 설정.
# 여기 H2 는 @SpringBootTest 컨텍스트 부팅 스모크(SensorMonitorApplicationTests.contextLoads)
# 전용이다 — 엔티티 매핑·빈 순환·설정 오류를 인프라 없이 싸게 잡을 뿐, DB 계층은 검증하지 않는다.
# 리포지토리·네이티브 쿼리·제약·컬럼 타입은 Testcontainers Postgres(@DataJpaTest, AbstractPostgresTest)로 검증한다.
# dialect 는 명시하지 않는다 — Hibernate 가 DataSource(H2/Postgres)에서 자동 감지한다.
# (예전엔 MODE=PostgreSQL + H2Dialect 조합이었는데, 이는 프로덕션과 다른 스키마를 만드는 모순이었다.)
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

jwt:
  secret-key: test-secret-key-for-ci-only-must-be-at-least-32-bytes
  expiration: 3600000
  refresh-expiration: 604800000
