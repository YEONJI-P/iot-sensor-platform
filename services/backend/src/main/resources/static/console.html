<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('sm-theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');}catch(e){document.documentElement.dataset.theme='dark';}</script>
  <title>관리 콘솔 · Sensor Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    /* 콘솔 전용 소소한 보정 */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0 1rem; align-items: end; }
    .form-grid .field { margin-bottom: .9rem; }
    .table-wrap { overflow-x: auto; }
    .hint { font-family: var(--font-mono); font-size: .68rem; color: var(--text-faint); letter-spacing: .04em; }
    .actions-cell { display: flex; gap: .4rem; flex-wrap: wrap; }
    .panel + .panel { margin-top: 1.4rem; }
    .device-toolbar { display: flex; align-items: end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .device-toolbar .field { min-width: min(280px, 100%); margin: 0; }
    .device-master-detail { display: grid; grid-template-columns: minmax(300px, .85fr) minmax(0, 1.4fr); gap: 1.2rem; margin-top: 1.2rem; align-items: start; }
    .device-master-detail > .panel + .panel { margin-top: 0; }
    .device-row { cursor: pointer; }
    .device-row:hover td { background: color-mix(in srgb, var(--brand) 7%, transparent); }
    .device-row.selected td { background: color-mix(in srgb, var(--brand) 13%, transparent); }
    .device-row.selected td:first-child { box-shadow: inset 3px 0 var(--brand); }
    .detail-summary { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .9rem 1.2rem; }
    .detail-item dt { color: var(--text-faint); font-family: var(--font-mono); font-size: .68rem; letter-spacing: .05em; margin-bottom: .25rem; }
    .detail-item dd { margin: 0; overflow-wrap: anywhere; }
    .detail-section { border-top: 1px solid var(--line); margin-top: 1.2rem; padding-top: 1.2rem; }
    .detail-head { display: flex; align-items: center; justify-content: space-between; gap: .8rem; margin-bottom: .8rem; }
    .modal-box .form-grid { margin-top: 1rem; }
    .calendar-settings { display:grid; grid-template-columns: minmax(220px,1fr) minmax(180px,.6fr); gap:1rem; }
    .calendar-day { display:grid; grid-template-columns:90px 1fr auto; gap:.7rem; align-items:start; padding:.75rem 0; border-bottom:1px solid var(--line-soft); }
    .calendar-intervals { display:flex; flex-direction:column; gap:.45rem; }
    .calendar-interval { display:grid; grid-template-columns:minmax(90px,1fr) auto minmax(90px,1fr) auto; gap:.4rem; align-items:center; }
    .calendar-overrides { display:flex; flex-direction:column; gap:.7rem; }
    .calendar-override { border:1px solid var(--line); border-radius:var(--radius-sm); padding:.8rem; background:var(--surface-2); }
    .calendar-message { margin-top:.8rem; font-size:.84rem; color:var(--text-dim); white-space:pre-line; }
    .calendar-message.error { color:var(--alarm); }
    .calendar-message.conflict { color:var(--brand); }
    @media (max-width: 860px) {
      .device-master-detail { grid-template-columns: 1fr; }
      .detail-summary { grid-template-columns: 1fr; }
      .calendar-settings, .calendar-day { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- ══ 상단바 ══ -->
<div class="topbar">
  <a class="brand" href="/index.html" title="홈으로"><span class="mark">SM</span> Sensor Monitor</a>
  <div class="topbar-right">
    <span class="clock" id="clock">--:--:--</span>
    <span class="identity">
      <span class="mono dim" id="navEmployee"></span>
      <span class="tag" id="navRole"></span>
    </span>
    <button class="btn btn-sm btn-ghost theme-toggle" data-theme-toggle aria-label="테마 전환"></button>
    <a class="btn btn-sm btn-ghost" href="/index.html">홈</a>
    <button class="btn btn-sm btn-danger" onclick="Auth.logout()">로그아웃</button>
  </div>
</div>

<div class="stage">
  <div class="eyebrow" style="margin-bottom:.6rem;">CONTROL · 관리 콘솔</div>
  <h1 style="font-size:1.7rem; margin-bottom:.4rem;">관리 콘솔</h1>
  <p class="dim" style="margin-bottom:1.6rem;">역할에 허용된 관리 기능만 표시됩니다.</p>

  <!-- 무권한 (VIEWER) -->
  <div id="noAccess" class="noaccess panel panel-pad hidden">
    <div class="flex items-center gap-sm" style="justify-content:center; margin-bottom:.9rem;">
      <span class="lamp idle"></span>
      <span class="eyebrow">ACCESS · DENIED</span>
    </div>
    <h3 style="margin-bottom:.5rem;">접근 권한 없음</h3>
    <p class="dim" style="margin-bottom:1.2rem;">이 역할은 관리 콘솔 접근 권한이 없습니다.</p>
    <a class="btn btn-sm btn-ghost" href="/index.html">홈으로 돌아가기</a>
  </div>

  <!-- 탭바 -->
  <div id="tabbar" class="tabbar hidden"></div>

  <!-- 탭 내용 -->
  <div id="tabPanel"></div>
</div>

<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/factory-selection.js"></script>
<script src="/js/calendar-validation.js"></script>
<script src="/js/console.js"></script>
</body>
</html>
