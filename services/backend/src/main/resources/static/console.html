<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('sm-theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');}catch(e){document.documentElement.dataset.theme='dark';}</script>
  <title>관리 콘솔 · Sensor Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    /* 콘솔 전용 소소한 보정 */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0 1rem; align-items: end; }
    .form-grid .field { margin-bottom: .9rem; }
    .table-wrap { overflow-x: auto; }
    .hint { font-family: var(--font-mono); font-size: .68rem; color: var(--text-faint); letter-spacing: .04em; }
    .actions-cell { display: flex; gap: .4rem; flex-wrap: wrap; }
    .panel + .panel { margin-top: 1.4rem; }
  </style>
</head>
<body>

<!-- ══ 상단바 ══ -->
<div class="topbar">
  <a class="brand" href="/index.html" title="홈으로"><span class="mark">SM</span> Sensor Monitor</a>
  <div class="topbar-right">
    <span class="clock" id="clock">--:--:--</span>
    <span class="identity">
      <span class="mono dim" id="navEmployee"></span>
      <span class="tag" id="navRole"></span>
    </span>
    <button class="btn btn-sm btn-ghost theme-toggle" data-theme-toggle aria-label="테마 전환"></button>
    <a class="btn btn-sm btn-ghost" href="/index.html">홈</a>
    <button class="btn btn-sm btn-danger" onclick="Auth.logout()">로그아웃</button>
  </div>
</div>

<div class="stage">
  <div class="eyebrow" style="margin-bottom:.6rem;">CONTROL · 관리 콘솔</div>
  <h1 style="font-size:1.7rem; margin-bottom:.4rem;">관리 콘솔</h1>
  <p class="dim" style="margin-bottom:1.6rem;">역할에 허용된 관리 기능만 표시됩니다.</p>

  <!-- 무권한 (VIEWER) -->
  <div id="noAccess" class="noaccess panel panel-pad hidden">
    <div class="flex items-center gap-sm" style="justify-content:center; margin-bottom:.9rem;">
      <span class="lamp idle"></span>
      <span class="eyebrow">ACCESS · DENIED</span>
    </div>
    <h3 style="margin-bottom:.5rem;">접근 권한 없음</h3>
    <p class="dim" style="margin-bottom:1.2rem;">이 역할은 관리 콘솔 접근 권한이 없습니다.</p>
    <a class="btn btn-sm btn-ghost" href="/index.html">홈으로 돌아가기</a>
  </div>

  <!-- 탭바 -->
  <div id="tabbar" class="tabbar hidden"></div>

  <!-- 탭 내용 -->
  <div id="tabPanel"></div>
</div>

<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/console.js"></script>
</body>
</html>
