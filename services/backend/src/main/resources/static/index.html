<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sensor Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('sm-theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');}catch(e){document.documentElement.dataset.theme='dark';}</script>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    /* 로그인 화면 전용 */
    .access-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
    .access { width: min(380px, calc(100vw - 3rem)); max-width: 100%; }
    .access .brand-lg { display: flex; align-items: center; gap: .7rem; margin-bottom: 1.6rem; }
    .access .brand-lg .mark { width: 38px; height: 38px; font-size: 1.15rem; border-radius: 9px; }
    .access .brand-lg .name { font-size: 1.15rem; font-weight: 700; }
    .status-line {
      display: flex; align-items: center; gap: .5rem; font-family: var(--font-mono);
      font-size: .72rem; letter-spacing: .12em; color: var(--text-faint);
      padding: .55rem .75rem; border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
      background: var(--bg); margin-bottom: 1.3rem;
    }
    /* 홈 화면 */
    .hero-eyebrow { margin-bottom: .6rem; }
    .entry {
      display: block; padding: 1.3rem 1.4rem; border: 1px solid var(--line);
      border-radius: var(--radius); background: var(--surface);
      transition: border-color .16s, transform .1s, background .16s; height: 100%;
    }
    .entry:hover { border-color: color-mix(in srgb, var(--brand) 55%, var(--line)); background: var(--surface-2); transform: translateY(-2px); }
    .entry .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
    .entry .title { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
    .entry .desc { font-size: .84rem; color: var(--text-dim); }
    .entry .arrow { color: var(--text-faint); font-family: var(--font-mono); }
    .clock { font-family: var(--font-mono); font-size: .82rem; color: var(--text-dim); }
  </style>
</head>
<body>

<button class="btn btn-sm btn-ghost theme-toggle theme-fab" data-theme-toggle aria-label="테마 전환"></button>

<!-- ══ 로그인 ══ -->
<div id="loginView" class="access-wrap hidden">
  <div class="access panel panel-pad">
    <div class="brand-lg">
      <span class="mark">SM</span>
      <span class="name">Sensor Monitor</span>
    </div>
    <div class="status-line">
      <span id="accessLamp" class="lamp idle"></span>
      <span id="accessStatus">SYSTEM · STANDBY</span>
    </div>

    <div class="field">
      <label for="employeeId">사원번호</label>
      <input id="employeeId" class="input" type="text" placeholder="예: SYSTEM" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input id="password" class="input" type="password" placeholder="비밀번호" autocomplete="current-password"/>
    </div>
    <div id="loginError" class="hidden" role="alert" style="color:var(--alarm); font-size:.82rem; margin-bottom:.8rem;"></div>
    <div id="loginNotice" class="hidden" role="status" aria-live="polite" style="color:var(--signal); font-size:.82rem; margin-bottom:.8rem;"></div>
    <button id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center;">접속</button>
    <p class="faint" style="font-size:.76rem; margin-top:1rem; text-align:center;">
      계정이 없으면 관리자 승인이 필요합니다.
    </p>
    <button id="showRegisterBtn" class="btn btn-ghost" style="width:100%; justify-content:center;">가입 요청</button>
  </div>
</div>

<!-- ══ 가입 요청 ══ -->
<div id="registerView" class="access-wrap hidden">
  <div class="access panel panel-pad">
    <div class="brand-lg">
      <span class="mark">SM</span>
      <span class="name">Sensor Monitor</span>
    </div>
    <div class="status-line">
      <span id="registerLamp" class="lamp idle"></span>
      <span id="registerStatus">ACCESS · REQUEST</span>
    </div>

    <div class="field">
      <label for="registerEmployeeId">사원번호</label>
      <input id="registerEmployeeId" class="input" type="text" placeholder="예: EMP001" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="registerName">이름</label>
      <input id="registerName" class="input" type="text" placeholder="이름" autocomplete="name"/>
    </div>
    <div class="field">
      <label for="registerPassword">비밀번호</label>
      <input id="registerPassword" class="input" type="password" placeholder="비밀번호" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label for="registerEmail">이메일 <span class="faint">(선택)</span></label>
      <input id="registerEmail" class="input" type="email" placeholder="name@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="registerFactoryId">공장</label>
      <select id="registerFactoryId" class="input" required disabled>
        <option value="">공장 목록 불러오는 중…</option>
      </select>
      <div id="registerFactoryLoadError" class="hidden" role="alert" style="color:var(--alarm); font-size:.78rem; margin-top:.45rem;">
        <span id="registerFactoryLoadErrorText"></span>
        <button id="retryRegisterFactoriesBtn" class="btn btn-sm btn-ghost" type="button" style="margin-left:.35rem;">다시 시도</button>
      </div>
    </div>
    <div id="registerError" class="hidden" role="alert" style="color:var(--alarm); font-size:.82rem; margin-bottom:.8rem;"></div>
    <button id="registerBtn" class="btn btn-primary" style="width:100%; justify-content:center;">승인 요청 보내기</button>
    <button id="cancelRegisterBtn" class="btn btn-ghost" style="width:100%; justify-content:center; margin-top:.45rem;">로그인으로 돌아가기</button>
  </div>
</div>

<!-- ══ 홈 (로그인 후) ══ -->
<div id="homeView" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="mark">SM</span> Sensor Monitor</div>
    <div class="topbar-right">
      <span class="clock" id="clock">--:--:--</span>
      <span class="identity">
        <span class="mono dim" id="navEmployee"></span>
        <span class="tag" id="navRole"></span>
      </span>
      <button class="btn btn-sm btn-danger" onclick="Auth.logout()">로그아웃</button>
    </div>
  </div>

  <div class="stage">
    <div class="eyebrow hero-eyebrow">CONSOLE · <span id="heroRole"></span></div>
    <h1 style="font-size:1.7rem; margin-bottom:.4rem;">접근 가능한 콘솔</h1>
    <p class="dim" style="margin-bottom:1.8rem;">역할에 허용된 화면입니다.</p>

    <div id="entries" class="grid g-3" style="margin-bottom:2.4rem;"></div>

    <div class="eyebrow" style="margin-bottom:.7rem;">API</div>
    <a href="/swagger-ui/index.html" target="_blank" class="entry" style="max-width:360px;">
      <div class="top"><span class="eyebrow">OPENAPI</span><span class="lamp ok"></span></div>
      <div class="title">Swagger UI</div>
      <div class="desc">REST API 명세와 직접 호출</div>
    </a>
  </div>
</div>

<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/factory-selection.js"></script>
<script>
  /* 역할 → 콘솔 진입점 (4역할 정합) */
  const ENTRIES = {
    dashboard: { href: '/dashboard.html', code: 'TELEMETRY', title: '센서 대시보드', desc: '실시간 센서값, 임계값 초과 알림 모니터링' },
    console:   { href: '/console.html',   code: 'CONTROL',   title: '관리 콘솔',     desc: '사용자 승인, 공장·구역, 장치 관리' },
  };
  const ROLE_ENTRIES = {
    SYSTEM_ADMIN: ['dashboard', 'console'],
    FACTORY_ADMIN: ['dashboard', 'console'],
    MEMBER:       ['dashboard', 'console'],
    VIEWER:       ['dashboard'],
  };

  function showLogin(message = '') {
    document.getElementById('loginView').classList.remove('hidden');
    document.getElementById('registerView').classList.add('hidden');
    document.getElementById('homeView').classList.add('hidden');
    document.getElementById('accessLamp').className = 'lamp idle';
    document.getElementById('accessStatus').textContent = 'SYSTEM · STANDBY';
    const notice = document.getElementById('loginNotice');
    notice.textContent = message;
    notice.classList.toggle('hidden', !message);
    document.getElementById('employeeId').focus();
  }

  let registerFactoryIds = new Set();
  let registerFactoryLoadVersion = 0;
  let registerFactoriesReady = false;
  let registerSubmitting = false;

  function setRegisterSubmitAvailability() {
    const select = document.getElementById('registerFactoryId');
    const factorySelected = registerFactoriesReady
      && FactorySelection.isAllowedId(select.value, registerFactoryIds);
    document.getElementById('registerBtn').disabled = registerSubmitting || !factorySelected;
  }

  function resetRegisterFactorySelect() {
    registerFactoryLoadVersion += 1;
    registerFactoryIds = new Set();
    registerFactoriesReady = false;
    const select = document.getElementById('registerFactoryId');
    select.innerHTML = '<option value="">공장을 선택해주세요</option>';
    select.value = '';
    select.disabled = true;
    select.removeAttribute('aria-invalid');
    document.getElementById('registerFactoryLoadError').classList.add('hidden');
    setRegisterSubmitAvailability();
  }

  async function loadRegisterFactories() {
    const version = ++registerFactoryLoadVersion;
    const select = document.getElementById('registerFactoryId');
    const errorWrap = document.getElementById('registerFactoryLoadError');
    const errorText = document.getElementById('registerFactoryLoadErrorText');
    const retryBtn = document.getElementById('retryRegisterFactoriesBtn');
    registerFactoryIds = new Set();
    registerFactoriesReady = false;
    select.disabled = true;
    select.innerHTML = '<option value="">공장 목록 불러오는 중…</option>';
    errorWrap.classList.add('hidden');
    retryBtn.disabled = true;
    document.getElementById('registerLamp').className = 'lamp warn';
    document.getElementById('registerStatus').textContent = 'ACCESS · 공장 조회 중…';
    setRegisterSubmitAvailability();

    try {
      const res = await fetch('/auth/factories');
      if (!res.ok) throw new Error('공장 목록을 불러오지 못했습니다.');
      const factories = await res.json();
      if (version !== registerFactoryLoadVersion) return;
      const validFactories = (Array.isArray(factories) ? factories : [])
        .filter(factory => FactorySelection.parsePositiveId(factory && factory.id) != null);
      if (validFactories.length === 0) throw new Error('가입 가능한 공장이 없습니다. 관리자에게 문의해주세요.');

      registerFactoryIds = new Set(validFactories.map(factory => FactorySelection.parsePositiveId(factory.id)));
      select.innerHTML = '<option value="">공장을 선택해주세요</option>'
        + validFactories.map(factory => `<option value="${FactorySelection.parsePositiveId(factory.id)}">${escapeRegisterHtml(factory.name)}</option>`).join('');
      select.disabled = false;
      registerFactoriesReady = true;
      document.getElementById('registerLamp').className = 'lamp idle';
      document.getElementById('registerStatus').textContent = 'ACCESS · REQUEST';
    } catch (e) {
      if (version !== registerFactoryLoadVersion) return;
      select.innerHTML = '<option value="">공장 목록을 불러올 수 없습니다</option>';
      errorText.textContent = e.message || '공장 목록을 불러오지 못했습니다.';
      errorWrap.classList.remove('hidden');
      document.getElementById('registerLamp').className = 'lamp alarm';
      document.getElementById('registerStatus').textContent = 'ACCESS · 목록 오류';
    } finally {
      if (version === registerFactoryLoadVersion) {
        retryBtn.disabled = false;
        setRegisterSubmitAvailability();
      }
    }
  }

  function escapeRegisterHtml(value) {
    const node = document.createElement('span');
    node.textContent = value == null ? '' : String(value);
    return node.innerHTML;
  }

  function showRegister() {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('homeView').classList.add('hidden');
    document.getElementById('registerView').classList.remove('hidden');
    document.getElementById('registerError').classList.add('hidden');
    document.getElementById('registerLamp').className = 'lamp idle';
    document.getElementById('registerStatus').textContent = 'ACCESS · 공장 조회 중…';
    const employeeId = document.getElementById('employeeId').value.trim();
    if (employeeId) document.getElementById('registerEmployeeId').value = employeeId;
    document.getElementById('registerEmployeeId').focus();
    loadRegisterFactories();
  }

  function clearRegisterForm() {
    ['registerEmployeeId', 'registerName', 'registerPassword', 'registerEmail']
      .forEach(id => { document.getElementById(id).value = ''; });
    registerSubmitting = false;
    resetRegisterFactorySelect();
  }

  function showHome() {
    const role = Auth.getRole();
    const rl = Auth.ROLE_LABEL[role] || { text: role, cls: '' };
    document.getElementById('navEmployee').textContent = Auth.getEmployeeId();
    const rt = document.getElementById('navRole');
    rt.textContent = rl.text; rt.className = 'tag ' + rl.cls;
    document.getElementById('heroRole').textContent = rl.text;

    const keys = ROLE_ENTRIES[role] || [];
    document.getElementById('entries').innerHTML = keys.map(k => {
      const e = ENTRIES[k];
      return `<a href="${e.href}" class="entry">
          <div class="top"><span class="eyebrow">${e.code}</span><span class="arrow">→</span></div>
          <div class="title">${e.title}</div>
          <div class="desc">${e.desc}</div>
        </a>`;
    }).join('');

    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('homeView').classList.remove('hidden');
    startClock();
  }

  async function doLogin() {
    const id = document.getElementById('employeeId').value.trim();
    const pw = document.getElementById('password').value;
    const err = document.getElementById('loginError');
    const lamp = document.getElementById('accessLamp');
    const status = document.getElementById('accessStatus');
    err.classList.add('hidden');
    document.getElementById('loginNotice').classList.add('hidden');
    lamp.className = 'lamp warn'; status.textContent = 'SYSTEM · 인증 중…';
    try {
      await Auth.login(id, pw);
      lamp.className = 'lamp ok'; status.textContent = 'SYSTEM · 접속됨';
      showHome();
    } catch (e) {
      lamp.className = 'lamp alarm'; status.textContent = 'SYSTEM · 거부됨';
      err.textContent = e.message; err.classList.remove('hidden');
    }
  }

  async function doRegister() {
    const employeeId = document.getElementById('registerEmployeeId').value.trim();
    const name = document.getElementById('registerName').value.trim();
    const password = document.getElementById('registerPassword').value;
    const emailEl = document.getElementById('registerEmail');
    const email = emailEl.value.trim();
    const factoryIdEl = document.getElementById('registerFactoryId');
    const factoryId = FactorySelection.parsePositiveId(factoryIdEl.value);
    const err = document.getElementById('registerError');
    const lamp = document.getElementById('registerLamp');
    const status = document.getElementById('registerStatus');

    if (registerSubmitting) return;
    err.classList.add('hidden');
    if (!employeeId || !name || !password) {
      err.textContent = '사원번호, 이름, 비밀번호를 입력해주세요.';
      err.classList.remove('hidden');
      return;
    }
    if (email && !emailEl.validity.valid) {
      err.textContent = '이메일 형식을 확인해주세요.';
      err.classList.remove('hidden');
      return;
    }
    if (!registerFactoriesReady || factoryId == null || !registerFactoryIds.has(factoryId)) {
      factoryIdEl.setAttribute('aria-invalid', 'true');
      err.textContent = '가입할 공장을 선택해주세요.';
      err.classList.remove('hidden');
      return;
    }

    factoryIdEl.removeAttribute('aria-invalid');
    registerSubmitting = true;
    factoryIdEl.disabled = true;
    setRegisterSubmitAvailability();
    lamp.className = 'lamp warn'; status.textContent = 'ACCESS · 요청 중…';
    try {
      const message = await Auth.register({
        employeeId,
        name,
        password,
        email: email || null,
        factoryId,
      });
      document.getElementById('employeeId').value = employeeId;
      clearRegisterForm();
      showLogin(message);
    } catch (e) {
      lamp.className = 'lamp alarm'; status.textContent = 'ACCESS · 거부됨';
      err.textContent = e.message; err.classList.remove('hidden');
    } finally {
      registerSubmitting = false;
      if (registerFactoriesReady) factoryIdEl.disabled = false;
      setRegisterSubmitAvailability();
    }
  }

  let clockTimer = null;
  function startClock() {
    const el = document.getElementById('clock');
    const tick = () => { el.textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false }); };
    tick(); if (!clockTimer) clockTimer = setInterval(tick, 1000);
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginView').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('showRegisterBtn').addEventListener('click', showRegister);
  document.getElementById('registerBtn').addEventListener('click', doRegister);
  document.getElementById('registerFactoryId').addEventListener('change', () => {
    document.getElementById('registerFactoryId').removeAttribute('aria-invalid');
    document.getElementById('registerError').classList.add('hidden');
    setRegisterSubmitAvailability();
  });
  document.getElementById('retryRegisterFactoriesBtn').addEventListener('click', loadRegisterFactories);
  document.getElementById('cancelRegisterBtn').addEventListener('click', () => {
    clearRegisterForm();
    showLogin();
  });
  document.getElementById('registerView').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('registerBtn').disabled) {
      e.preventDefault(); doRegister();
    }
  });

  /* 진입 */
  if (Auth.isLoggedIn()) showHome(); else showLogin();
</script>
</body>
</html>
