<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>IoT Sensor Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    /* 로그인 화면 전용 */
    .access-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
    .access { width: 380px; max-width: 100%; }
    .access .brand-lg { display: flex; align-items: center; gap: .7rem; margin-bottom: 1.6rem; }
    .access .brand-lg .mark { width: 38px; height: 38px; font-size: 1.15rem; border-radius: 9px; }
    .access .brand-lg .name { font-size: 1.15rem; font-weight: 700; }
    .status-line {
      display: flex; align-items: center; gap: .5rem; font-family: var(--font-mono);
      font-size: .72rem; letter-spacing: .12em; color: var(--text-faint);
      padding: .55rem .75rem; border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
      background: var(--bg); margin-bottom: 1.3rem;
    }
    /* 홈 화면 */
    .hero-eyebrow { margin-bottom: .6rem; }
    .entry {
      display: block; padding: 1.3rem 1.4rem; border: 1px solid var(--line);
      border-radius: var(--radius); background: var(--surface);
      transition: border-color .16s, transform .1s, background .16s; height: 100%;
    }
    .entry:hover { border-color: color-mix(in srgb, var(--brand) 55%, var(--line)); background: var(--surface-2); transform: translateY(-2px); }
    .entry .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
    .entry .title { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
    .entry .desc { font-size: .84rem; color: var(--text-dim); }
    .entry .arrow { color: var(--text-faint); font-family: var(--font-mono); }
    .clock { font-family: var(--font-mono); font-size: .82rem; color: var(--text-dim); }
  </style>
</head>
<body>

<!-- ══ 로그인 ══ -->
<div id="loginView" class="access-wrap hidden">
  <div class="access panel panel-pad">
    <div class="brand-lg">
      <span class="mark">IO</span>
      <span class="name">Sensor Platform</span>
    </div>
    <div class="status-line">
      <span id="accessLamp" class="lamp idle"></span>
      <span id="accessStatus">SYSTEM · STANDBY</span>
    </div>

    <div class="field">
      <label for="employeeId">사원번호</label>
      <input id="employeeId" class="input" type="text" placeholder="예: ADMIN001" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input id="password" class="input" type="password" placeholder="비밀번호" autocomplete="current-password"/>
    </div>
    <div id="loginError" class="hidden" style="color:var(--alarm); font-size:.82rem; margin-bottom:.8rem;"></div>
    <button id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center;">접속</button>
    <p class="faint" style="font-size:.76rem; margin-top:1rem; text-align:center;">
      계정이 없으면 관리자 승인이 필요합니다.
    </p>
  </div>
</div>

<!-- ══ 홈 (로그인 후) ══ -->
<div id="homeView" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="mark">IO</span> Sensor Platform</div>
    <div class="topbar-right">
      <span class="clock" id="clock">--:--:--</span>
      <span class="identity">
        <span class="mono dim" id="navEmployee"></span>
        <span class="tag" id="navRole"></span>
      </span>
      <button class="btn btn-sm btn-danger" onclick="Auth.logout()">로그아웃</button>
    </div>
  </div>

  <div class="stage">
    <div class="eyebrow hero-eyebrow">CONSOLE · <span id="heroRole"></span></div>
    <h1 style="font-size:1.7rem; margin-bottom:.4rem;">접근 가능한 콘솔</h1>
    <p class="dim" style="margin-bottom:1.8rem;">역할에 허용된 화면입니다.</p>

    <div id="entries" class="grid g-3" style="margin-bottom:2.4rem;"></div>

    <div class="eyebrow" style="margin-bottom:.7rem;">API</div>
    <a href="/swagger-ui/index.html" target="_blank" class="entry" style="max-width:360px;">
      <div class="top"><span class="eyebrow">OPENAPI</span><span class="lamp ok"></span></div>
      <div class="title">Swagger UI</div>
      <div class="desc">REST API 명세와 직접 호출</div>
    </a>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  /* 역할 → 콘솔 진입점 (4역할 정합) */
  const ENTRIES = {
    dashboard: { href: '/dashboard.html', code: 'TELEMETRY', title: '센서 대시보드', desc: '실시간 센서값, 임계값 초과 알림 모니터링' },
    console:   { href: '/console.html',   code: 'CONTROL',   title: '관리 콘솔',     desc: '사용자 승인, 공장·구역, 장치 관리' },
  };
  const ROLE_ENTRIES = {
    SYSTEM_ADMIN: ['dashboard', 'console'],
    FACTORY_ADMIN: ['console'],
    MEMBER:       ['dashboard', 'console'],
    VIEWER:       ['dashboard'],
  };

  function showLogin() {
    document.getElementById('loginView').classList.remove('hidden');
    document.getElementById('homeView').classList.add('hidden');
    document.getElementById('employeeId').focus();
  }

  function showHome() {
    const role = Auth.getRole();
    const rl = Auth.ROLE_LABEL[role] || { text: role, cls: '' };
    document.getElementById('navEmployee').textContent = Auth.getEmployeeId();
    const rt = document.getElementById('navRole');
    rt.textContent = rl.text; rt.className = 'tag ' + rl.cls;
    document.getElementById('heroRole').textContent = rl.text;

    const keys = ROLE_ENTRIES[role] || [];
    document.getElementById('entries').innerHTML = keys.map(k => {
      const e = ENTRIES[k];
      return `<a href="${e.href}" class="entry">
          <div class="top"><span class="eyebrow">${e.code}</span><span class="arrow">→</span></div>
          <div class="title">${e.title}</div>
          <div class="desc">${e.desc}</div>
        </a>`;
    }).join('');

    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('homeView').classList.remove('hidden');
    startClock();
  }

  async function doLogin() {
    const id = document.getElementById('employeeId').value.trim();
    const pw = document.getElementById('password').value;
    const err = document.getElementById('loginError');
    const lamp = document.getElementById('accessLamp');
    const status = document.getElementById('accessStatus');
    err.classList.add('hidden');
    lamp.className = 'lamp warn'; status.textContent = 'SYSTEM · 인증 중…';
    try {
      await Auth.login(id, pw);
      lamp.className = 'lamp ok'; status.textContent = 'SYSTEM · 접속됨';
      showHome();
    } catch (e) {
      lamp.className = 'lamp alarm'; status.textContent = 'SYSTEM · 거부됨';
      err.textContent = e.message; err.classList.remove('hidden');
    }
  }

  let clockTimer = null;
  function startClock() {
    const el = document.getElementById('clock');
    const tick = () => { el.textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false }); };
    tick(); if (!clockTimer) clockTimer = setInterval(tick, 1000);
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginView').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  /* 진입 */
  if (Auth.isLoggedIn()) showHome(); else showLogin();
</script>
</body>
</html>
