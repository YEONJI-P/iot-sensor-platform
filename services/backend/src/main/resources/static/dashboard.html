<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>센서 대시보드 · Sensor Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    /* 대시보드 전용 보조 스타일 (디자인 토큰·컴포넌트는 app.css) */
    .ctl-row {
      display: flex; align-items: flex-end; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1.4rem;
    }
    .ctl-row .field { margin-bottom: 0; flex: 1 1 300px; min-width: 260px; max-width: 480px; }
    .ctl-row .refresh-tag { margin-left: auto; align-self: center; }

    .dash-grid { grid-template-columns: 2fr 1fr; align-items: start; margin-bottom: 1.1rem; }
    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }

    .chart-box { position: relative; height: 260px; padding: .7rem .4rem .3rem; }
    .bar-box   { position: relative; height: 220px; padding: .7rem .4rem .3rem; }
    .chart-box canvas, .bar-box canvas { max-width: 100%; }

    .readout-stack { display: flex; flex-direction: column; }
    .readout-stack .ro {
      display: flex; align-items: flex-start; gap: .85rem;
      padding: 1.15rem 1.3rem; border-bottom: 1px solid var(--line-soft);
    }
    .readout-stack .ro:last-child { border-bottom: none; }
    .readout-stack .ro .lamp { margin-top: .45rem; }

    .thr-badge {
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: .04em;
      color: var(--brand); border: 1px dashed color-mix(in srgb, var(--brand) 50%, var(--line));
      padding: .16rem .5rem; border-radius: 5px; white-space: nowrap;
    }
    .log-wrap { max-height: 480px; overflow: auto; }
    .evi { display: block; font-size: .76rem; color: var(--text-faint); margin-top: .3rem; line-height: 1.4; }
    .evi .k { font-family: var(--font-mono); letter-spacing: .04em; color: var(--text-dim); }
    .cell-alarm { color: var(--alarm); font-weight: 600; }
  </style>
</head>
<body>

<!-- ══ 상단바 ══ -->
<div class="topbar">
  <div class="brand"><span class="mark">SM</span> Sensor Monitor</div>
  <div class="topbar-right">
    <span class="clock" id="clock">--:--:--</span>
    <span class="flex items-center gap-sm" title="실시간 스트림 연결 상태">
      <span class="lamp idle" id="sseLamp"></span>
      <span class="eyebrow" id="sseLabel">STREAM · 대기</span>
    </span>
    <span class="identity">
      <span class="mono dim" id="navEmployee"></span>
      <span class="tag" id="navRole"></span>
    </span>
    <a class="btn btn-sm btn-ghost" href="/index.html">홈</a>
    <button class="btn btn-sm btn-danger" onclick="Auth.logout()">로그아웃</button>
  </div>
</div>

<!-- ══ 무권한 안내 ══ -->
<div id="noAccess" class="noaccess hidden">
  <div class="flex items-center gap-sm" style="justify-content:center; margin-bottom:1rem;">
    <span class="lamp idle"></span>
    <span class="eyebrow">ACCESS · DENIED</span>
  </div>
  <h1 style="font-size:1.35rem; margin-bottom:.6rem;">접근 불가</h1>
  <p class="dim" style="margin-bottom:1.4rem;">이 역할은 대시보드 접근 권한이 없습니다.</p>
  <a class="btn btn-sm btn-ghost" href="/index.html">홈으로 돌아가기</a>
</div>

<!-- ══ 대시보드 ══ -->
<div id="dash" class="stage hidden">
  <div class="eyebrow" style="margin-bottom:.5rem;">TELEMETRY</div>
  <h1 style="font-size:1.7rem; margin-bottom:1.3rem;">센서 대시보드</h1>

  <div class="ctl-row">
    <div class="field">
      <label for="deviceSelect">채널</label>
      <select class="input" id="deviceSelect">
        <option value="">장치를 불러오는 중…</option>
      </select>
    </div>
    <span class="tag refresh-tag" id="refreshTag">갱신 대기</span>
  </div>

  <!-- 실시간 라인 차트 + 텔레메트리 리드아웃 -->
  <div class="grid dash-grid">
    <div class="panel">
      <div class="panel-head">
        <h3>실시간 센서값</h3>
        <span class="thr-badge" id="thrBadge">임계값 —</span>
      </div>
      <div class="chart-box">
        <div class="empty" id="lineEmpty">채널을 선택하면 실시간 센서값이 표시됩니다.</div>
        <canvas id="lineChart" class="hidden"></canvas>
      </div>
    </div>

    <div class="panel readout-stack">
      <div class="ro">
        <span class="lamp idle" id="roAlertLamp"></span>
        <div class="readout">
          <span class="val" id="roAlertCount">—</span>
          <span class="lbl">최근 알림 수</span>
        </div>
      </div>
      <div class="ro">
        <span class="lamp idle" id="roWeekLamp"></span>
        <div class="readout">
          <span class="val" id="roWeekCount">—</span>
          <span class="lbl">최근 7일 알림</span>
        </div>
      </div>
      <div class="ro">
        <span class="lamp idle" id="roDataLamp"></span>
        <div class="readout">
          <span class="val" id="roDataCount">—</span>
          <span class="lbl">수집 데이터 수</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 일별 알림 바 차트 -->
  <div class="panel" style="margin-bottom:1.1rem;">
    <div class="panel-head"><h3>최근 7일 알림 발생</h3></div>
    <div class="bar-box">
      <div class="empty" id="barEmpty">채널을 선택하면 일별 알림 발생 건수가 표시됩니다.</div>
      <canvas id="barChart" class="hidden"></canvas>
    </div>
  </div>

  <!-- 최근 알림 로그 -->
  <div class="panel">
    <div class="panel-head"><h3>최근 알림</h3></div>
    <div class="log-wrap">
      <table class="table">
        <thead>
          <tr>
            <th style="width:54px;">상태</th>
            <th>장치</th>
            <th style="width:98px;">센서값</th>
            <th style="width:98px;">임계값</th>
            <th>메시지</th>
            <th style="width:150px;">발생시각</th>
          </tr>
        </thead>
        <tbody id="alertBody">
          <tr id="alertEmptyRow">
            <td colspan="6"><div class="empty">채널을 선택하면 최근 알림이 표시됩니다.</div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
