spring:
  application:
    name: sensor-monitor
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sensor_monitor_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /api-docs

jwt:
  secret-key: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 604800000

# AX(Python) 서비스 연동
ax:
  base-url: ${AX_BASE_URL:http://localhost:8000}
  enabled: ${AX_ENABLED:false}

---
# local 프로파일: 개발 편의 설정 (SQL 로그 등). 기본 활성 프로파일.
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
