server:
  port: ${SERVER_PORT:23100}

spring:
  application:
    name: sensor-monitor
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sensor_monitor}
    username: ${DB_USERNAME:sensor_monitor}
    password: ${DB_PASSWORD:sensor_monitor}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  # 로컬 기본 동작은 기존 Hibernate update를 유지한다. 운영(prod)에서만 Flyway를 켜고
  # Hibernate는 migration 결과를 validate한다(application-prod.yml).
  flyway:
    enabled: false
  jackson:
    serialization:
      # 시각 필드를 epoch 숫자가 아닌 ISO-8601 문자열로 직렬화 (Instant는 끝에 Z 부착)
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /api-docs

jwt:
  secret-key: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 604800000

ingest:
  api-key: ${INGEST_API_KEY}

# explain(Python) 서비스 연동
explain:
  base-url: ${EXPLAIN_BASE_URL:http://localhost:23200}
  enabled: ${EXPLAIN_ENABLED:false}

---
# local 프로파일: 개발 편의 설정 (SQL 로그 등). bootRun 등 프로파일 미지정 시 기본값.
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
